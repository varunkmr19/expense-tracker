{% extends 'layout_auth.html' %}
{% load static %}

{% block content %}
<div class="row">
  <div class="col-md-3"></div>
  <div class="col-md-6">
    <div class="card mt-5">
      <div class="card-body">
        <div class="card-title py-3">
          <h4>Login to your account</h4>
        </div>
        <form action="{% url 'login' %}" method="POST">
          {% csrf_token %}
          {% include 'partials/_messages.html' %}
          <div class="form-group">
            <label for="username">Username</label>
            <input 
              type="text"
              name="username"
              id="username"
              class="form-control"
              placeholder="Username"
              value="{{ field_values.username }}"
            >
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input 
              type="password"
              name="password"
              id="password"
              class="form-control"
              placeholder="Password"
            >
          </div>
          <button type="submit" class="btn btn-block btn-primary submit-btn">Login</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-3"></div>
</div>

{% endblock %}
