{% extends 'layout_auth.html' %}
{% load static %}

{% block content %}
<div class="row">
  <div class="col-md-3"></div>
  <div class="col-md-6">
    <div class="card mt-5">
      <div class="card-body">
        <div class="card-title py-3">
          <h4>Register for a free account</h4>
        </div>
        <form action="{% url 'register' %}" method="POST">
          {% csrf_token %}
          {% include 'partials/_messages.html' %}
          <div class="form-group">
            <label for="username">Username</label>
            <input 
              type="text"
              name="username"
              id="username"
              class="form-control"
              placeholder="Username"
              value="{{ field_values.username }}"
            >
            <small id="username-feedback" class="form-text" style="display: none;"></small>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input 
              type="email"
              name="email"
              id="email"
              class="form-control"
              placeholder="Email"
              value="{{ field_values.email }}"
            >
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input 
              type="password"
              name="password"
              id="password"
              class="form-control"
              placeholder="Password"
            >
          </div>
          <div class="form-check float-right mb-2">
            <input type="checkbox" class="form-check-input" id="show-password-toggle">
            <label class="form-check-label" for="show-password-toggle">Show password</label>
          </div>
          <button type="submit" class="btn btn-block btn-primary submit-btn">Register</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-3"></div>
</div>

<script src="{% static 'expenses/js/register.js' %}"></script>
{% endblock %}
